name: CI Guardian (Institutional-Grade)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  quality-check:
    name: Linting & Formatting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        run: uv python install 3.10

      - name: Run Ruff (Linter & Formatter)
        run: |
          uv run ruff check .
          uv run ruff format --check .

  type-check:
    name: Type Guard (Mypy)
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        run: uv python install 3.10

      - name: Run Mypy (Types)
        run: uv run mypy app/

  unit-tests:
    name: Financial Logic Tests (Pytest)
    runs-on: ubuntu-latest
    needs: [quality-check, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        run: uv python install 3.10

      - name: Run Pytest
        run: uv run pytest tests/
