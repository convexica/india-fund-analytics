name: CI Guardian (Institutional-Grade)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  quality-check:
    name: Linting & Formatting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Run Ruff (Linter & Formatter)
        run: |
          uv run ruff check .
          uv run ruff format --check .

  type-check:
    name: Type Guard (Mypy)
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Run Mypy (Types)
        run: uv run mypy app/

  unit-tests:
    name: Financial Logic Tests (Pytest)
    runs-on: ubuntu-latest
    needs: [quality-check, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Run Pytest
        run: uv run pytest tests/
